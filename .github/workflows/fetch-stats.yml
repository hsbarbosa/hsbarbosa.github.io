name: Fetch Academic Stats

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  fetch-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build stats JSON
        env:
          S2_AUTHOR_ID: "144447784"
          ORCID_ID: "0000-0002-3927-969X"
          RECENT_YEAR_WINDOW: "5"
          S2_MAX_PAPERS: "1000"
          S2_API_KEY: ${{ secrets.S2_API_KEY }}
        run: |
          python scripts/fetch_stats.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/auto/stats.json
          git commit -m "chore: update academic stats"
          git push
